version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  AI Paperwork Assistant — Local Development Stack
#  Place this file in: paperwork-backend-clean/backend/docker-compose.yml
#
#  Start:   docker compose up -d
#  Stop:    docker compose down
#  Logs:    docker compose logs -f
#  Reset:   docker compose down -v  (deletes all data)
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: paperwork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperwork_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Myshopping@123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paperwork_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: paperwork-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible file storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: paperwork-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web dashboard → http://localhost:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO bucket auto-setup ───────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: paperwork-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/documents;
      mc anonymous set none local/documents;
      echo 'MinIO bucket ready';
      "
    networks:
      - default

  # ── ClamAV (malware scanning) ─────────────────────────────────────────
  # Note: takes 2-3 minutes on first start to download virus definitions
  clamav:
    image: clamav/clamav:stable
    container_name: paperwork-clamav
    restart: unless-stopped
    volumes:
      - clamav_db:/var/lib/clamav
    ports:
      - "3310:3310"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_db: